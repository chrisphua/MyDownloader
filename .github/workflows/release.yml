name: release

# Push a version tag (e.g. v0.1.1) to build macOS + Windows and attach them
# to the GitHub Release. Or run manually via "Run workflow".
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            name: macOS (Apple Silicon)
          - os: windows-latest
            name: Windows (x64)
    runs-on: ${{ matrix.os }}
    # macOS signing secrets. All empty when unset → the build falls back to
    # ad-hoc signing. Add these repo secrets to switch on Developer ID +
    # notarization (see README → "macOS code signing").
    env:
      APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install dependencies
        run: npm ci

      # ── Bundle the platform's yt-dlp + ffmpeg into binaries/ ──────────────
      - name: Download binaries (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p binaries
          curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_macos -o /tmp/yt-dlp-fat
          lipo /tmp/yt-dlp-fat -thin arm64 -output binaries/yt-dlp
          chmod +x binaries/yt-dlp
          curl -L https://github.com/eugeneware/ffmpeg-static/releases/download/b6.1.1/ffmpeg-darwin-arm64 -o binaries/ffmpeg
          chmod +x binaries/ffmpeg

      - name: Download binaries (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path binaries | Out-Null
          Invoke-WebRequest -Uri "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe" -OutFile "binaries/yt-dlp.exe"
          Invoke-WebRequest -Uri "https://github.com/eugeneware/ffmpeg-static/releases/download/b6.1.1/ffmpeg-win32-x64" -OutFile "binaries/ffmpeg.exe"

      # ── Import Developer ID cert (only when signing secrets are present) ────
      # Creates a throwaway keychain, imports the .p12, and pre-signs the bundled
      # yt-dlp/ffmpeg with the Developer ID + hardened runtime so every Mach-O in
      # the bundle passes notarization. Skipped entirely when secrets are unset.
      - name: Set up macOS signing keychain
        if: runner.os == 'macOS' && env.APPLE_CERTIFICATE_BASE64 != ''
        run: |
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          KC_PW="$(uuidgen)"
          security create-keychain -p "$KC_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KC_PW" "$KEYCHAIN"
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" \
            -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KC_PW" "$KEYCHAIN" >/dev/null
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          for b in binaries/yt-dlp binaries/ffmpeg; do
            codesign --force --timestamp --options runtime \
              --sign "$APPLE_SIGNING_IDENTITY" "$b"
          done

      # ── Build ─────────────────────────────────────────────────────────────
      # forge.config.ts reads the APPLE_* env: with a signing identity it does a
      # Developer ID sign + notarize during packaging; without one it builds
      # unsigned and the stage step below ad-hoc signs instead.
      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: npm run make -- --arch arm64 --platform darwin

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: npm run make -- --arch x64 --platform win32

      # ── Stage assets with stable, version-less names so /latest/download
      #    links never break across releases ───────────────────────────────
      # Two paths:
      #  • Signing secrets present → forge already Developer ID-signed + notarized
      #    the .app during the build; verify and staple the notarization ticket.
      #  • No secrets → ad-hoc sign so Apple Silicon stops calling it "damaged"
      #    (unsigned arm64 apps fail Gatekeeper's signature check outright; a
      #    valid ad-hoc signature downgrades that to the milder "unidentified
      #    developer" prompt, which right-click → Open clears).
      # Re-zip with ditto either way to preserve bundle symlinks and signature.
      - name: Sign/verify and stage (macOS)
        if: runner.os == 'macOS'
        run: |
          APP=$(ls -d out/*/MyDownloader.app | head -1)
          if [ -n "$APPLE_SIGNING_IDENTITY" ]; then
            echo "Developer ID build — verifying signature and stapling ticket"
            codesign --verify --deep --strict --verbose=2 "$APP"
            xcrun stapler staple "$APP"
          else
            echo "No signing secrets — ad-hoc signing $APP"
            codesign --force --deep --sign - "$APP"
            codesign --verify --deep --strict --verbose=2 "$APP"
          fi
          mkdir -p dist
          ditto -c -k --keepParent "$APP" "dist/MyDownloader-macOS-arm64.zip"

      - name: Stage assets (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item out/make/squirrel.windows/x64/MyDownloader-Setup.exe dist/MyDownloader-Setup.exe

      # ── Publish to the GitHub Release for this tag ─────────────────────────
      - name: Attach artifacts to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: apps/desktop/dist/*

      # ── Otherwise (manual run) upload as a workflow artifact for inspection ─
      - name: Upload build artifact
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: MyDownloader-${{ runner.os }}
          path: apps/desktop/dist/*
