# Local-only services for offline development.
#
# Run from the repo root:
#   docker compose up -d
#
# Brings up DynamoDB Local on port 8000 with persistent data in ./.dynamodb-data.
# Stop with:
#   docker compose down
#
# Wipe data:
#   docker compose down -v && rm -rf .dynamodb-data

services:
  dynamodb:
    image: amazon/dynamodb-local:latest
    container_name: todo-app-dynamodb
    command:
      - "-jar"
      - "DynamoDBLocal.jar"
      - "-sharedDb"
      - "-dbPath"
      - "/data"
    ports:
      - "8000:8000"
    volumes:
      - ./.dynamodb-data:/data
    healthcheck:
      test:
        ["CMD-SHELL", "curl -fsS http://localhost:8000 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
